name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Install go-winres
        run: go install github.com/tc-hib/go-winres@v0.3.3

      - name: Patch version from tag
        shell: pwsh
        run: |
          $tag    = $env:GITHUB_REF_NAME -replace '^v', ''
          $semver = $tag -replace '-.*$', ''
          $parts  = $semver.Split('.') + @('0','0','0')
          $fileVer = "$($parts[0]).$($parts[1]).$($parts[2]).0"

          $json = Get-Content winres/winres.json -Raw | ConvertFrom-Json -Depth 32
          $json.RT_MANIFEST.'#1'.'0409'.identity.version       = $fileVer
          $json.RT_VERSION.'#1'.'0000'.fixed.file_version      = $fileVer
          $json.RT_VERSION.'#1'.'0000'.fixed.product_version   = $fileVer
          $json.RT_VERSION.'#1'.'0000'.info.'0409'.FileVersion    = $semver
          $json.RT_VERSION.'#1'.'0000'.info.'0409'.ProductVersion = $semver
          $json | ConvertTo-Json -Depth 32 | Set-Content winres/winres.json -Encoding UTF8

      - name: Embed version info into both binaries
        shell: bash
        run: |
          go-winres make
          cp rsrc_windows_amd64.syso cmd/cli/
          cp rsrc_windows_amd64.syso cmd/service/

      - name: Build
        shell: bash
        env:
          GOOS: windows
          GOARCH: amd64
        run: |
          mkdir -p build
          go build -trimpath -ldflags="-s -w" -o build/cli.exe     ./cmd/cli
          go build -trimpath -ldflags="-s -w" -o build/service.exe ./cmd/service

      - name: Package release zip
        shell: pwsh
        run: |
          Compress-Archive `
            -Path build/cli.exe, build/service.exe, examples `
            -DestinationPath build/stalart-wrapper.zip `
            -Force

      - name: Upload
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: build/stalart-wrapper.zip
